<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <meta name="description" content="Gk Cabs - Premium Taxi Booking Solution" />

    <meta name="author" content="Gk Cabs" />
    <meta name="theme-color" content="#174897" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>Gk Cabs App</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com/" />
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />

    />

    <!-- Iconsax CSS -->
    <link rel="stylesheet" type="text/css" href="assets/css/iconsax.css" />

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />

    <!-- AOS CSS -->
    <link rel="stylesheet" href="assets/css/aos.css" />

    <link rel="stylesheet" href="assets/css/style.css" />

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Iconsax JS -->
    <script src="assets/js/iconsax.js"></script>

    <script src="assets/js/aos.js"></script>

      document.addEventListener('DOMContentLoaded', function () {
        if (typeof AOS !== 'undefined') {
          AOS.init({ once: true, duration: 1000 });
        }
      });
    </script>

    <!-- Custom Script -->
    <script src="assets/js/script.js"></script>
